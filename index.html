<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <title id="web-title">會議現場簽到系統</title>
  <style>
    body { background-color: #f8f9fa; padding: 20px; font-family: "Microsoft JhengHei", sans-serif; }
    .container { max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .hidden { display: none !important; }
    .list-group-item { cursor: pointer; }
    .list-group-item:hover { background-color: #e9ecef; }
    
    .signature-trigger-box {
      border: 2px dashed #0d6efd;
      border-radius: 8px;
      background: #f1f7ff;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0d6efd;
      font-weight: bold;
      cursor: pointer;
      overflow: hidden;
    }
    #preview-img { max-height: 90%; max-width: 90%; object-fit: contain; }

    #fullscreen-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #111111; z-index: 9999; display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    
    .rotated-container {
      width: 100%; height: 100%; display: flex; flex-direction: row; box-sizing: border-box; padding: 10px; gap: 12px;
    }
    
    .canvas-sidebar {
      width: 130px; display: flex; flex-direction: column; justify-content: space-between; color: white;
    }
    
    #canvas { flex: 1; background: #ffffff; border-radius: 8px; touch-action: none; height: 100%; }
    .canvas-controls { display: flex; flex-direction: column; gap: 8px; }

    #orientation-warning {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; color: white; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
    }
    .phone-icon { font-size: 50px; animation: rotatePhone 2s infinite ease-in-out; margin-bottom: 15px; }
    @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(-90deg); } }
    
    #print-table-body tr { height: 70px; }
    #print-table-body td { height: 70px; padding: 2px 4px !important; vertical-align: middle; overflow: hidden; }
  </style>
</head>
<body>

<div class="container mt-3" id="mainApp">
  <h3 id="main-app-title" class="text-center mb-4 text-primary fw-bold">會議現場簽到系統</h3>
  
  <div id="step-mode" class="d-grid gap-2">
    <button class="btn btn-outline-primary btn-lg" onclick="switchMode('search')">🔍 名單內簽到</button>
    <button class="btn btn-outline-secondary btn-lg" onclick="switchMode('new')">➕ 現場臨時加簽</button>
    <button class="btn btn-dark mt-4" onclick="checkAdminPassword()">🖨️ 主辦方輸出簽到表 (需密碼)</button>
  </div>

  <div id="mode-search" class="hidden">
    <button class="btn btn-sm btn-link p-0 mb-3" onclick="goBack()">< 返回</button>
    <h5>請輸入姓名或單位搜尋：</h5>
    <input type="text" id="search-input" class="form-control mb-3" placeholder="關鍵字..." oninput="filterList()">
    <ul id="user-list" class="list-group overflow-auto" style="max-height: 250px;"></ul>
  </div>

  <div id="mode-new" class="hidden">
    <button class="btn btn-sm btn-link p-0 mb-3" onclick="goBack()">< 返回</button>
    <h5>請輸入您的資料：</h5>
    <div class="mb-3">
      <label class="form-label">單位</label>
      <input type="text" id="new-unit" class="form-control" placeholder="例如：資訊組">
    </div>
    <div class="mb-3">
      <label class="form-label">姓名</label>
      <input type="text" id="new-name" class="form-control" placeholder="請輸入姓名">
    </div>
    <button class="btn btn-primary w-100" onclick="confirmNewUser()">下一頁：手寫簽名</button>
  </div>

  <div id="step-signature" class="hidden">
    <button class="btn btn-sm btn-link p-0 mb-3" onclick="goBackToMode()">< 返回</button>
    <h5 id="sign-title" class="mb-3">請點擊下方區塊進行簽名：</h5>
    <div id="already-signed-hint" class="alert alert-warning py-2 small hidden">⚠️ 您之前已簽到過，再次送出將會覆蓋舊簽名。</div>
    
    <div class="signature-trigger-box mb-4" onclick="openFullscreenSign()">
      <span id="trigger-text">✍️ 點擊此處 開啟全螢幕橫式簽名</span>
      <img id="preview-img" class="hidden">
    </div>
    
    <button class="btn btn-success w-100 btn-lg" id="submit-btn" onclick="submitRouter()" disabled>確認送出簽到</button>
  </div>
  
  <div id="step-success" class="hidden text-center py-4">
    <h2 class="text-success">🎉</h2>
    <h4 class="text-success mb-3">簽到成功！</h4>
    <p>感謝您的參與，請步入會場。</p>
    <button class="btn btn-primary mt-3" onclick="resetApp()">回首頁</button>
  </div>
</div>

<div id="fullscreen-overlay" class="hidden">
  <div id="orientation-warning">
    <div class="phone-icon">📱</div>
    <h4>請將手機「橫著拿」</h4>
    <p class="text-muted small">橫向螢幕才能提供完整的簽名空間</p>
    <button class="btn btn-sm btn-outline-light mt-3" onclick="closeFullscreenSign(false)">✕ 離開簽名</button>
  </div>

  <div class="rotated-container">
    <div class="canvas-sidebar">
      <div>
        <span id="pop-title" class="fw-bold text-primary" style="font-size: 14px;">請簽名</span>
        <hr class="my-2" style="border-color: #444;">
      </div>
      <div class="canvas-controls">
        <button class="btn btn-warning btn-sm w-100 py-2" onclick="clearCanvas()">↩ 重簽</button>
        <button class="btn btn-primary btn-sm w-100 py-2 fw-bold" onclick="closeFullscreenSign(true)">✓ 完成</button>
        <button class="btn btn-outline-light btn-sm w-100 mt-2" onclick="closeFullscreenSign(false)" style="font-size: 11px;">✕ 離開</button>
      </div>
    </div>
    <canvas id="canvas"></canvas>
  </div>
</div>

<div id="mode-print" class="container-fluid hidden bg-white p-4">
  <div class="d-print-none mb-4">
    <button class="btn btn-danger" onclick="document.getElementById('mode-print').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); document.getElementById('step-mode').classList.remove('hidden');">離開列印頁面</button>
    <button class="btn btn-success ms-2" onclick="window.print()">確認列印 / 另存 PDF</button>
    
    <button class="btn btn-primary ms-2" onclick="document.getElementById('print-table-body').innerHTML = '<tr><td colspan=\'5\' class=\'text-center text-muted py-4\'>正在重新同步後端資料...</td></tr>'; fetchDataWithRetry(3);">🔄 重新整理資料</button>
  </div>
  
  <div class="text-center mb-4">
    <h2 id="print-meeting-name" class="fw-bold mb-3">會議簽到成果表</h2>
    <div class="d-flex flex-column align-items-center text-start mx-auto mb-4" style="max-width: 600px; font-size: 16px; line-height: 1.8;">
      <div class="w-100"><strong>會議時間：</strong><span id="print-meeting-time"></span></div>
      <div class="w-100"><strong>會議地點：</strong><span id="print-meeting-location"></span></div>
      <div class="w-100"><strong>會議主席：</strong><span id="print-meeting-chair"></span></div>
    </div>
  </div>
  
  <table class="table table-bordered align-middle mx-auto" style="max-width: 900px;">
    <thead class="table-light">
      <tr>
        <th style="width: 8%">序號</th>
        <th style="width: 22%">單位</th>
        <th style="width: 20%">姓名</th>
        <th style="width: 35%">簽名</th>
        <th style="width: 15%">備註</th>
      </tr>
    </thead>
    <tbody id="print-table-body">
      <tr><td colspan="5" class="text-center text-muted py-4">正在同步後端最新簽到資料，請稍候...</td></tr>
    </tbody>
  </table>
</div>

<script>
  // ⚠️ 關鍵設定：請在下方雙引號內填入您在 GAS 複製的 /exec 網址！
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyjONRzQFJDlJMnD6WXyyPHqRFgnNsUKs6jhzazFBqtefxYIu_oGoQV52m1aMw8KHU3/exec";

  let fullList = [];
  let serverRecords = [];
  let serverAttendeeList = [];
  let serverInfo = { name: '', time: '', location: '', chair: '', useGPS: true, systemName: '' };
  let selectedUser = { unit: '', name: '', isNew: false };
  let currentMode = '';
  let hasSigned = false; 

  window.onload = function() {
    fetchDataWithRetry(3); // 初始啟動：失敗最多重試 3 次
  };

  // 🛡️ 核心強化：自動重試網路請求函數
  function fetchDataWithRetry(retriesLeft) {
    fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: "getPrintData" })
    })
    .then(res => res.json())
    .then(res => {
      if(res && res.status === "success") {
        serverRecords = res.serverRecords;
        serverAttendeeList = res.serverAttendeeList;
        serverInfo = res.serverInfo;
        
        if (serverInfo && serverInfo.systemName) {
          document.getElementById('main-app-title').innerText = serverInfo.systemName;
          document.title = serverInfo.systemName;
        }
        
        fullList = [];
        for (let i = 1; i < serverAttendeeList.length; i++) {
          fullList.push({ unit: serverAttendeeList[i][0], name: serverAttendeeList[i][1] });
        }
        
        // 如果使用者此時處於列印頁，主動幫他把資料刷出來
        if (!document.getElementById('mode-print').classList.contains('hidden')) {
          renderPrintTable();
        }
      } else {
        throw new Error("後端回傳格式不正確");
      }
    })
    .catch(err => {
      console.warn(`資料撈取失敗，剩餘重試次數: ${retriesLeft}`, err);
      if (retriesLeft > 0) {
        setTimeout(() => {
          fetchDataWithRetry(retriesLeft - 1);
        }, 1500); // 每次失敗隔 1.5 秒再試
      } else {
        const tbody = document.getElementById('print-table-body');
        if(tbody) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger fw-bold">連線超時，請重新整理網頁再試。</td></tr>';
        }
      }
    });
  }

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('step-mode').classList.add('hidden');
    if(mode === 'print') {
      document.getElementById('mainApp').classList.add('hidden');
      document.getElementById('mode-print').classList.remove('hidden');
      loadPrintData();
    } else {
      document.getElementById('mode-' + mode).classList.remove('hidden');
    }
  }

  function goBack() {
    document.getElementById('mode-search').classList.add('hidden');
    document.getElementById('mode-new').classList.add('hidden');
    document.getElementById('step-mode').classList.remove('hidden');
  }

  function checkAlreadySigned(unit, name) {
    if (!serverRecords) return false;
    for (let i = 1; i < serverRecords.length; i++) {
      if (serverRecords[i][1] === unit && serverRecords[i][2] === name) return true;
    }
    return false;
  }

  function filterList() {
    const keyword = document.getElementById('search-input').value.toLowerCase();
    const ul = document.getElementById('user-list');
    ul.innerHTML = '';
    if(!keyword) return;

    const filtered = fullList.filter(u => u.name.toLowerCase().includes(keyword) || u.unit.toLowerCase().includes(keyword));
    filtered.forEach(u => {
      const li = document.createElement('li');
      li.className = 'list-group-item d-flex justify-content-between align-items-center';
      
      const isSignedToday = checkAlreadySigned(u.unit, u.name);
      if (isSignedToday) {
        li.innerHTML = `<span>[${u.unit}] ${u.name}</span> <span class="badge bg-success">已簽過</span>`;
      } else {
        li.innerText = `[${u.unit}] ${u.name}`;
      }
      
      li.onclick = () => selectUser(u.unit, u.name, false);
      ul.appendChild(li);
    });
  }

  function confirmNewUser() {
    const unit = document.getElementById('new-unit').value.trim();
    const name = document.getElementById('new-name').value.trim();
    if(!unit || !name) { alert('請填寫單位與姓名！'); return; }
    selectUser(unit, name, true);
  }

  function selectUser(unit, name, isNew) {
    selectedUser = { unit, name, isNew };
    document.getElementById('mode-search').classList.add('hidden');
    document.getElementById('mode-new').classList.add('hidden');
    document.getElementById('step-signature').classList.remove('hidden');
    document.getElementById('sign-title').innerText = `請【${name}】進行簽名：`;
    
    const hintBox = document.getElementById('already-signed-hint');
    if (!isNew && checkAlreadySigned(unit, name)) {
      hintBox.classList.remove('hidden');
    } else {
      hintBox.classList.add('hidden');
    }
    
    hasSigned = false;
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('trigger-text').classList.remove('hidden');
    document.getElementById('preview-img').classList.add('hidden');
    document.getElementById('preview-img').src = '';
  }

  function goBackToMode() {
    document.getElementById('step-signature').classList.add('hidden');
    if(selectedUser.isNew) {
      document.getElementById('mode-new').classList.remove('hidden');
    } else {
      document.getElementById('mode-search').classList.remove('hidden');
    }
  }

  window.addEventListener("resize", checkOrientation);
  window.addEventListener("orientationchange", checkOrientation);

  function checkOrientation() {
    const overlay = document.getElementById('fullscreen-overlay');
    if (!overlay.classList.contains('hidden')) {
      const warning = document.getElementById('orientation-warning');
      if (window.innerWidth < window.innerHeight) {
        warning.style.display = 'flex';
      } else {
        warning.style.display = 'none';
        setTimeout(function() { initCanvas(); }, 100);
      }
    }
  }

  function openFullscreenSign() {
    document.getElementById('fullscreen-overlay').classList.remove('hidden');
    document.getElementById('pop-title').innerText = `請【${selectedUser.name}】在下方正楷簽名：`;
    checkOrientation();
  }

  function closeFullscreenSign(saveRecords) {
    if (saveRecords && hasSigned) {
      const dataUrl = canvas.toDataURL();
      document.getElementById('preview-img').src = dataUrl;
      document.getElementById('preview-img').classList.remove('hidden');
      document.getElementById('trigger-text').classList.add('hidden');
      document.getElementById('submit-btn').disabled = false;
    }
    document.getElementById('fullscreen-overlay').classList.add('hidden');
  }

  let canvas, ctx, isDrawing = false;
  function initCanvas() {
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 4; 
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function getStandardXY(e) {
      const r = canvas.getBoundingClientRect();
      let clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return {
        x: (clientX - r.left) * (canvas.width / r.width),
        y: (clientY - r.top) * (canvas.height / r.height)
      };
    }

    canvas.addEventListener('mousedown', e => { 
      isDrawing = true; 
      ctx.beginPath();
      const pos = getStandardXY(e);
      ctx.moveTo(pos.x, pos.y); 
    });
    canvas.addEventListener('mousemove', e => { 
      if (isDrawing) {
        hasSigned = true;
        const pos = getStandardXY(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
      }
    });
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);
    
    canvas.addEventListener('touchstart', e => { 
      isDrawing = true; 
      ctx.beginPath();
      const pos = getStandardXY(e);
      ctx.moveTo(pos.x, pos.y); 
      e.preventDefault(); 
    }, { passive: false });
    canvas.addEventListener('touchmove', e => { 
      if (!isDrawing) return;
      hasSigned = true;
      const pos = getStandardXY(e);
      ctx.lineTo(pos.x, pos.y); 
      ctx.stroke();
      e.preventDefault(); 
    }, { passive: false });
    canvas.addEventListener('touchend', e => { isDrawing = false; e.preventDefault(); }, { passive: false });
  }

  function clearCanvas() {
    if (canvas && ctx) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath();
      isDrawing = false;
      hasSigned = false;
    }
  }

  function submitRouter() {
    const btn = document.getElementById('submit-btn');
    const signatureData = document.getElementById('preview-img').src;
    
    if (serverInfo && serverInfo.useGPS === false) {
      btn.disabled = true;
      btn.innerText = '傳送中...';
      executeSubmit(signatureData, "後台關閉定位");
      return;
    }

    btn.disabled = true;
    btn.innerText = '正在獲取定位並傳送...';
    
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const mapUrl = "http://maps.google.com/?q=" + lat + "," + lng;
          executeSubmit(signatureData, mapUrl);
        },
        function(error) {
          let errorMsg = "未授權定位";
          if (error.code === error.POSITION_UNAVAILABLE) errorMsg = "定位訊號不足";
          if (error.code === error.TIMEOUT) errorMsg = "定位超時";
          executeSubmit(signatureData, errorMsg);
        },
        { enableHighAccuracy: true, timeout: 7000 }
      );
    } else {
      executeSubmit(signatureData, "不支援GPS裝置");
    }
  }

  function executeSubmit(signatureData, locationStr) {
    fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: "submitSignIn",
        unit: selectedUser.unit,
        name: selectedUser.name,
        signatureData: signatureData,
        isNew: selectedUser.isNew,
        locationStr: locationStr
      })
    })
    .then(res => res.json())
    .then(res => {
      if(res.status === "success") {
        document.getElementById('step-signature').classList.add('hidden');
        document.getElementById('step-success').classList.remove('hidden');
      } else {
        alert("簽到失敗，請重試");
        document.getElementById('submit-btn').disabled = false;
      }
    }).catch(err => {
      alert("網路連線異常，請稍後再試");
      document.getElementById('submit-btn').disabled = false;
    });
  }

  function resetApp() {
    document.getElementById('step-success').classList.add('hidden');
    document.getElementById('step-mode').classList.remove('hidden');
    
    document.getElementById('search-input').value = '';
    document.getElementById('new-unit').value = '';
    document.getElementById('new-name').value = '';
    document.getElementById('user-list').innerHTML = '';
    
    fetchDataWithRetry(2); // 回首頁時自動默默在背景刷新一次
  }

  function loadPrintData() {
    // 檢查資料是否已經到位，有的話直接畫出來，沒有的話會等 window.onload 的 fetch 完成自動繪製
    if (serverAttendeeList && serverAttendeeList.length > 0) {
      renderPrintTable();
    }
  }

  // 將表格繪製邏輯獨立拆出，方便隨時調用
  function renderPrintTable() {
    const tbody = document.getElementById('print-table-body');
    if (!tbody) return;
    tbody.innerHTML = '';
    
    if (serverInfo) {
      document.getElementById('print-meeting-name').innerText = serverInfo.name ? serverInfo.name : "會議簽到成果表";
      document.getElementById('print-meeting-time').innerText = serverInfo.time || '—';
      document.getElementById('print-meeting-location').innerText = serverInfo.location || '—';
      document.getElementById('print-meeting-chair').innerText = serverInfo.chair || '—';
    }

    let globalIndex = 1;
    let recordMap = {};
    
    if (serverRecords) {
      for (let r = 1; r < serverRecords.length; r++) {
        let key = serverRecords[r][1] + "_" + serverRecords[r][2];
        recordMap[key] = { img: serverRecords[r][3], note: serverRecords[r][4] };
      }
    }

    if (serverAttendeeList && serverAttendeeList.length > 1) {
      for (let i = 1; i < serverAttendeeList.length; i++) {
        const uUnit = serverAttendeeList[i][0];
        const uName = serverAttendeeList[i][1];
        const key = uUnit + "_" + uName;
        
        let signImgHtml = '';
        let noteText = '';
        
        if (recordMap[key]) {
          signImgHtml = `<img src="${recordMap[key].img}" style="height: auto; max-height: 60px; width: auto; max-width: 160px; object-fit: contain; display: block; margin: 0 auto;">`;
          noteText = recordMap[key].note === "現場補登" ? "現場補登" : "";
        }
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${globalIndex++}</td>
          <td>${uUnit}</td>
          <td>${uName}</td>
          <td style="text-align: center;">${signImgHtml}</td>
          <td>${noteText}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    if (serverRecords) {
      for (let r = 1; r < serverRecords.length; r++) {
        const rUnit = serverRecords[r][1];
        const rName = serverRecords[r][2];
        const rSign = serverRecords[r][3];
        const rNote = actualRecords[r] ? actualRecords[r][4] : ''; 
        // 修正現場補登渲染容錯
        const currentNote = rNote || serverRecords[r][4];
        
        let isOfficial = false;
        if (serverAttendeeList) {
          for (let i = 1; i < serverAttendeeList.length; i++) {
            if (serverAttendeeList[i][0] === rUnit && serverAttendeeList[i][1] === rName) {
              isOfficial = true;
              break;
            }
          }
        }
        
        if (!isOfficial && currentNote === "現場補登") {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="table-warning-light">${globalIndex++}</td>
            <td>${rUnit}</td>
            <td>${rName}</td>
            <td style="text-align: center;"><img src="${rSign}" style="height: auto; max-height: 60px; width: auto; max-width: 160px; object-fit: contain; display: block; margin: 0 auto;"></td>
            <td class="text-danger fw-bold">${currentNote}</td>
          `;
          tbody.appendChild(tr);
        }
      }
    }
  }

  function checkAdminPassword() {
    const adminPassword = "1234";

    if (userInput === adminPassword) {
      switchMode('print');
    } else {
      alert("密碼錯誤！您沒有權限存取此資料。");
    }
  }
